env:
  TERM: xterm-256color

font:
  size: 12
  normal:
    family: Liberation Mono
    style: Regular
  italic:
    family: Liberation Mono
    style: Italic
  bold:
    family: Liberation Mono
    style: Bold
  bold_italic:
    family: Liberation Mono
    style: Bold Italic

window:
  padding:
    x: 10
    y: 4

  dynamic_padding: false

  opacity: 0.9

  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 5000

  
draw_bold_text_with_bright_colors: true

selection:
  save_to_clipboard: true

cursor:
  style: Block

key_bindings:
  - { key: Equals, mods: Option, action: IncreaseFontSize }
  - { key: Plus, mods: Option, action: IncreaseFontSize }
  - { key: Minus, mods: Option, action: DecreaseFontSize }
  - { key: L, mods: Option, action: ClearLogNotice }
  - { key: L, mods: Option, chars: "\x0c" }
